<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>WORLD-OCEAN-NOVA-AGI-BÖRSE</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Courier New', Courier, monospace;
            color: #00ff00;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .ui-panel {
            position: relative;
            z-index: 2;
            max-width: 1100px;
            margin: 40px auto;
            background: rgba(10, 15, 20, 0.85);
            border: 2px solid #00ffcc;
            box-shadow: 0 0 25px #00ffcc;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }
        h1 {
            color: #ff00ff;
            text-shadow: 0 0 15px #ff00ff;
            font-size: 2.2em;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #00ffcc;
            font-size: 1.1em;
            margin-bottom: 25px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .neon-btn {
            background: transparent;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 15px;
            font-size: 14px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            border-radius: 6px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 8px rgba(0,255,0,0.2), 0 0 8px rgba(0,255,0,0.2);
        }
        .neon-btn:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 20px #00ff00;
            transform: scale(1.03);
        }
        .btn-ai { border-color: #ff00ff; color: #ff00ff; box-shadow: 0 0 8px rgba(255,0,255,0.2); }
        .btn-ai:hover { background: #ff00ff; color: #000; box-shadow: 0 0 20px #ff00ff; }
        
        .btn-global { border-color: #00ffcc; color: #00ffcc; box-shadow: 0 0 8px rgba(0,255,204,0.2); }
        .btn-global:hover { background: #00ffcc; color: #000; box-shadow: 0 0 20px #00ffcc; }
    </style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<div class="ui-panel">
    <h1>WORLD-OCEAN-NOVA-AGI-BÖRSE</h1>
    <div class="subtitle">Система Управления Архитектора Валериюса Литвиноваса | Активный Контур</div>
    <p style="color: #ffffff;">Нажмите на любую управляющую кнопку для автоматического перехода к мировым финансовым и интеллектуальным узлам:</p>

    <div class="grid-container">
        <button class="neon-btn" onclick="window.open('https://github.com', '_blank')">Открыть Наш GitHub</button>
        <button class="neon-btn" onclick="window.open('https://www.nasdaq.com', '_blank')">Мировые Биржи (NASDAQ)</button>
        <button class="neon-btn" onclick="window.open('https://www.bloomberg.com', '_blank')">Глобальные Финансы</button>
        
        <button class="neon-btn btn-global" onclick="window.open('https://google.com', '_blank')">Google Система</button>
        <button class="neon-btn btn-global" onclick="window.open('https://youtube.com', '_blank')">YouTube Медиа</button>
        <button class="neon-btn btn-global" onclick="window.open('https://yandex.ru', '_blank')">Яндекс Платформа</button>
        <button class="neon-btn btn-global" onclick="window.open('https://gmail.com', '_blank')">Узел Почты Gmail</button>

        <button class="neon-btn btn-ai" onclick="window.open('https://gemini.google.com', '_blank')">Интерфейс Gemini</button>
        <button class="neon-btn btn-ai" onclick="window.open('https://chatgpt.com', '_blank')">Контур ChatGPT</button>
        <button class="neon-btn btn-ai" onclick="window.open('https://copilot.microsoft.com', '_blank')">Copilot ИИ</button>
    </div>
</div>

<script>
    // Скрипт Разноцветного Матричного Дождя
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');

    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const chars = "010101ABCDEFGHJKLMNOPQRSTUVWXYZ#$@%&";
    const charArr = chars.split("");

    const fontSize = 14;
    const columns = canvas.width / fontSize;

    const rainDrops = [];
    for (let x = 0; x < columns; x++) {
        rainDrops[x] = 1;
    }

    // Список неоновых цветов для матричного дождя
    const colors = ['#00ff00', '#00ffcc', '#ff00ff', '#00ffff', '#3fb950'];

    function drawMatrix() {
        ctx.fillStyle = 'rgba(5, 5, 5, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < rainDrops.length; i++) {
            const text = charArr[Math.floor(Math.random() * charArr.length)];
            
            // Случайный выбор цвета для создания разноцветного эффекта
            ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
            ctx.font = fontSize + 'px monospace';
            
            ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

            if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                rainDrops[i] = 0;
            }
            rainDrops[i]++;
        }
    }

    window.addEventListener('resize', () => {
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;
    });

    setInterval(drawMatrix, 30);
</script>

</body>
</html>
